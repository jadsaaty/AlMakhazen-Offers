<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المخازن – عروض الخضار والفاكهة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-deep: #1a5c2a;
      --green-mid: #2d8c47;
      --green-light: #4db86a;
      --yellow-bright: #f5c800;
      --yellow-soft: #fef3b0;
      --cream: #f9f6ef;
      --white: #ffffff;
      --text-dark: #1a2e1d;
      --shadow-green: rgba(29,92,42,0.18);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Cairo',sans-serif;
      background-color:var(--cream);
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 0%,rgba(77,184,106,0.12) 0%,transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%,rgba(245,200,0,0.10) 0%,transparent 60%);
      min-height:100vh; overflow-x:hidden;
    }
    header {
      background:linear-gradient(135deg,var(--green-deep) 0%,var(--green-mid) 60%,var(--green-light) 100%);
      padding:36px 40px 28px; text-align:center; position:relative; overflow:hidden;
      box-shadow:0 6px 32px var(--shadow-green);
    }
    header::before {
      content:''; position:absolute; inset:0;
      background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='28' fill='none' stroke='rgba(255,255,255,0.06)' stroke-width='1'/%3E%3C/svg%3E") repeat;
      opacity:0.4; pointer-events:none;
    }
    header .leaf-deco { position:absolute;font-size:6rem;opacity:0.08;top:-10px;left:30px;transform:rotate(-20deg);pointer-events:none; }
    header .leaf-deco2 { position:absolute;font-size:5rem;opacity:0.08;bottom:-8px;right:20px;transform:rotate(15deg);pointer-events:none; }
    .header-badge {
      display:inline-block; background:var(--yellow-bright); color:var(--green-deep);
      font-family:'Cairo',sans-serif; font-weight:900; font-size:0.78rem; letter-spacing:0.08em;
      padding:5px 18px; border-radius:30px; margin-bottom:12px; text-transform:uppercase;
      box-shadow:0 2px 10px rgba(245,200,0,0.4); animation:badgePop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    header h1 {
      color:var(--white); font-family:'Cairo',sans-serif; font-weight:900;
      font-size:clamp(1.8rem,4vw,2.8rem); line-height:1.2;
      animation:slideDown 0.7s ease both 0.1s; text-shadow:0 2px 16px rgba(0,0,0,0.2);
    }
    header p { color:rgba(255,255,255,0.85); font-size:1rem; margin-top:8px; font-weight:400; animation:slideDown 0.7s ease both 0.2s; }
    main {
      max-width:860px; margin:0 auto; padding:40px 24px 60px;
      display:flex; flex-direction:column; gap:40px;
    }
    .offer-card {
      background:var(--white); border-radius:20px; overflow:hidden;
      box-shadow:0 4px 24px var(--shadow-green),0 1px 4px rgba(0,0,0,0.06);
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s ease;
      animation:cardIn 0.7s ease both;
    }
    .offer-card:nth-child(1) { animation-delay:0.1s; }
    .offer-card:nth-child(2) { animation-delay:0.25s; }
    .offer-card:hover {
      transform:translateY(-6px) scale(1.01);
      box-shadow:0 14px 44px rgba(29,92,42,0.22),0 2px 8px rgba(0,0,0,0.08);
    }
    .card-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 22px 12px;
      background:linear-gradient(90deg,var(--green-deep),var(--green-mid));
    }
    .card-number {
      width:38px; height:38px; background:var(--yellow-bright); color:var(--green-deep);
      border-radius:50%; font-family:'Cairo',sans-serif; font-weight:900; font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 10px rgba(245,200,0,0.5); flex-shrink:0;
    }
    .card-title { color:white; font-family:'Cairo',sans-serif; font-weight:700; font-size:1.05rem; flex:1; text-align:center; letter-spacing:0.02em; }
    .card-tag { background:rgba(255,255,255,0.18); color:rgba(255,255,255,0.9); font-size:0.72rem; font-weight:600; padding:3px 10px; border-radius:12px; letter-spacing:0.05em; }
    .card-img-wrap { width:100%; background:#f4f8f5; line-height:0; }
    .card-img-wrap img { width:100%; height:auto; display:block; transition:filter 0.3s ease; }
    .offer-card:hover .card-img-wrap img { filter:brightness(1.04) saturate(1.05); }
    .card-footer {
      padding:13px 22px;
      background:linear-gradient(90deg,var(--yellow-soft),rgba(255,255,255,0.6));
      display:flex; align-items:center; gap:10px;
    }
    .card-footer .dot { width:8px; height:8px; border-radius:50%; background:var(--green-mid); }
    .card-footer span { font-family:'Tajawal',sans-serif; color:var(--green-deep); font-size:0.85rem; font-weight:500; }
    footer { text-align:center; padding:22px 20px 32px; color:var(--green-deep); font-family:'Tajawal',sans-serif; font-size:0.82rem; opacity:0.65; }
    @keyframes badgePop { from { opacity:0; transform:scale(0.6); } to { opacity:1; transform:scale(1); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes cardIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @media (max-width:600px) { header { padding:28px 20px 22px; } main { padding:28px 14px 50px; } }
  </style>
</head>
